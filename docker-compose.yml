version: "3.8"

services:
  oracle-db:
    image: container-registry.oracle.com/database/free:latest-lite
    environment:
      ORACLE_PWD: OraclePageIndex123
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "sqlplus", "-L", "sys/OraclePageIndex123@//localhost:1521/FREEPDB1 as sysdba", "@/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  oracle-data:

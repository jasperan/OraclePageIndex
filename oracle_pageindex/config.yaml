# Ollama LLM configuration
ollama:
  base_url: "http://localhost:11434"
  model: "gemma3"
  temperature: 0
  num_ctx: 16384

# Oracle Database configuration
# Override via env vars: ORACLE_USER, ORACLE_PASSWORD, ORACLE_DSN
oracle:
  user: "pageindex"
  password: "pageindex"  # pragma: allowlist secret
  dsn: "localhost:1521/FREEPDB1"
  pool_min: 1
  pool_max: 5

# PageIndex configuration (kept from original)
toc_check_page_num: 5
max_token_num_each_node: 20000
if_add_node_id: "yes"
if_add_node_summary: "no"
if_add_doc_description: "no"
if_add_node_text: "no"
if_extract_entities: "no"

# Entity resolution configuration
# Uses Oracle VECTOR_DISTANCE on name embeddings to find duplicate entities
entity_resolution:
  enabled: true
  embedding_model: "nomic-embed-text"
  similarity_threshold: 0.3
  auto_confirm_threshold: 0.15
